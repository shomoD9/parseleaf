# This workflow is Parseleaf's release conveyor. It exists so one semver tag can
# turn into all public artifacts in a reproducible order: validate the package,
# publish npm, build standalone macOS binaries, verify the Homebrew formula, and
# then update the dedicated tap repository.
name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing semver tag to rebuild, such as v0.1.0"
        required: true
        type: string

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.metadata.outputs.tag }}
      version: ${{ steps.metadata.outputs.version }}
    steps:
      - name: Check out the tagged source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Resolve the release tag and verify package version parity
        id: metadata
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          case "$TAG" in
            v*) ;;
            *)
              echo "Release tags must start with v. Got: $TAG" >&2
              exit 1
              ;;
          esac

          VERSION="${TAG#v}"
          PACKAGE_VERSION="$(node -e "const fs = require('node:fs'); const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8')); process.stdout.write(pkg.version);")"

          if [ "$VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version $VERSION does not match package.json version $PACKAGE_VERSION" >&2
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  quality:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Check out the release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run the test suite
        run: npm test

      - name: Build the npm distribution
        run: npm run build

      - name: Verify the curated npm tarball
        run: npm run pack:check

      - name: Smoke-test install from the generated tarball
        run: |
          # `npm pack` writes prepack/build chatter before the tarball name, so
          # we keep only the final line for the later install command.
          TARBALL="$(npm pack --cache /tmp/parseleaf-npm-cache | tail -n 1)"
          PREFIX="$RUNNER_TEMP/npm-global"

          npm install --global --prefix "$PREFIX" "./$TARBALL"
          "$PREFIX/bin/parseleaf" --help | grep "Usage: parseleaf convert"

  build_binary:
    runs-on: ${{ matrix.runner }}
    needs:
      - prepare
      - quality
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            arch: x64
          - runner: macos-14
            arch: arm64
    steps:
      - name: Check out the release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build the standalone SEA artifact
        run: npm run build:sea -- --output-dir "$RUNNER_TEMP/sea-${{ matrix.arch }}"

      - name: Smoke-test the binary help output
        run: |
          "$RUNNER_TEMP/sea-${{ matrix.arch }}/parseleaf" --help | grep "Usage: parseleaf convert"

      - name: Smoke-test a real EPUB conversion with the standalone binary
        run: |
          FIXTURE_ROOT="$RUNNER_TEMP/epub3"
          EPUB_PATH="$RUNNER_TEMP/fixture.epub"
          OUTPUT_PATH="$RUNNER_TEMP/output"

          cp -R test/fixtures/epub3 "$FIXTURE_ROOT"
          (
            cd "$FIXTURE_ROOT"
            /usr/bin/zip -X0 "$EPUB_PATH" mimetype
            /usr/bin/zip -Xr9D "$EPUB_PATH" META-INF OEBPS
          )

          "$RUNNER_TEMP/sea-${{ matrix.arch }}/parseleaf" convert "$EPUB_PATH" --out "$OUTPUT_PATH"
          test -f "$OUTPUT_PATH/manifest.json"

      - name: Upload the release tarball
        uses: actions/upload-artifact@v4
        with:
          name: parseleaf-darwin-${{ matrix.arch }}
          path: ${{ runner.temp }}/sea-${{ matrix.arch }}/parseleaf-darwin-${{ matrix.arch }}.tar.gz

  release:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build_binary
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Check out the release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Set up Node 22 for publishing
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download the standalone artifacts
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/release-assets

      - name: Flatten the artifact layout and compute checksums
        run: |
          find "$RUNNER_TEMP/release-assets" -type f -name "*.tar.gz" -exec mv {} "$RUNNER_TEMP/release-assets" \;
          cd "$RUNNER_TEMP/release-assets"
          shasum -a 256 parseleaf-darwin-*.tar.gz > checksums.txt

      - name: Create or update the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$RUNNER_TEMP/release-assets"/parseleaf-darwin-*.tar.gz "$RUNNER_TEMP/release-assets/checksums.txt" --clobber
          else
            gh release create "$TAG" "$RUNNER_TEMP/release-assets"/parseleaf-darwin-*.tar.gz "$RUNNER_TEMP/release-assets/checksums.txt" --title "$TAG" --generate-notes --verify-tag
          fi

      - name: Publish the npm package if this version is not already live
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          PUBLISHED_VERSION="$(npm view parseleaf@"$VERSION" version 2>/dev/null || true)"

          if [ "$PUBLISHED_VERSION" = "$VERSION" ]; then
            echo "parseleaf@$VERSION is already published; skipping npm publish."
          else
            # Trusted publishing uses the job's OIDC identity instead of a
            # long-lived npm token, so the repository settings are the gate.
            npm publish --provenance --access public
          fi

      - name: Render the Homebrew formula for this release
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          ARM64_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/parseleaf-darwin-arm64.tar.gz"
          X64_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/parseleaf-darwin-x64.tar.gz"
          ARM64_SHA="$(awk '/parseleaf-darwin-arm64.tar.gz$/ { print $1 }' "$RUNNER_TEMP/release-assets/checksums.txt")"
          X64_SHA="$(awk '/parseleaf-darwin-x64.tar.gz$/ { print $1 }' "$RUNNER_TEMP/release-assets/checksums.txt")"

          node ./scripts/release/render-homebrew-formula.mjs \
            --version "$VERSION" \
            --arm64-url "$ARM64_URL" \
            --arm64-sha256 "$ARM64_SHA" \
            --x64-url "$X64_URL" \
            --x64-sha256 "$X64_SHA" \
            --output "$RUNNER_TEMP/parseleaf.rb"

      - name: Upload the rendered Homebrew formula
        uses: actions/upload-artifact@v4
        with:
          name: homebrew-formula
          path: ${{ runner.temp }}/parseleaf.rb

  verify_homebrew:
    runs-on: ${{ matrix.runner }}
    needs: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
          - runner: macos-14
    steps:
      - name: Download the rendered Homebrew formula
        uses: actions/download-artifact@v4
        with:
          name: homebrew-formula
          path: ${{ runner.temp }}/homebrew

      - name: Install Parseleaf through Homebrew and run the formula test
        run: |
          TAP_NAME="local/parseleaf-verify"
          TAP_ROOT="$(brew --repository)/Library/Taps/local/homebrew-parseleaf-verify"

          # Homebrew now insists that formulae live inside a tap, so CI creates
          # a throwaway local tap and installs Parseleaf the same way users will.
          brew tap-new "$TAP_NAME" --no-git
          mkdir -p "$TAP_ROOT/Formula"
          cp "$RUNNER_TEMP/homebrew/parseleaf.rb" "$TAP_ROOT/Formula/parseleaf.rb"

          HOMEBREW_NO_AUTO_UPDATE=1 brew install "$TAP_NAME/parseleaf"
          brew test parseleaf

  update_homebrew_tap:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - verify_homebrew
    steps:
      - name: Download the rendered Homebrew formula
        uses: actions/download-artifact@v4
        with:
          name: homebrew-formula
          path: ${{ runner.temp }}/homebrew

      - name: Clone the dedicated Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/shomoD9/homebrew-parseleaf.git" "$RUNNER_TEMP/homebrew-parseleaf"

      - name: Update the tap formula and push it to main
        run: |
          TAP_REPO="$RUNNER_TEMP/homebrew-parseleaf"

          mkdir -p "$TAP_REPO/Formula"
          cp "$RUNNER_TEMP/homebrew/parseleaf.rb" "$TAP_REPO/Formula/parseleaf.rb"

          cd "$TAP_REPO"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- Formula/parseleaf.rb; then
            echo "Tap already points at this release."
            exit 0
          fi

          git add Formula/parseleaf.rb
          git commit -m "parseleaf ${{ needs.prepare.outputs.version }}"
          git push origin HEAD:main
